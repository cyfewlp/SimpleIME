[Tool Window]

$Settings = 设置

[Settings]
$Mod_Config = Mod
$Enable_Mod = 启用Mod
$Enable_Mod_Tooltip = 取消勾选以禁用所有 mod 功能(禁用键盘)
$Apply = 确定
$Font = 字体
$Font_Size = 字体尺寸
$Font_Size_Scale = 字体尺寸缩放
$Font_Builder = 字体构建器
$Font_Builder_Add = 添加字体
$Font_Builder_SetAsDefault = 设置为默认字体
$Font_Builder_Reset = 重置
$Font_Builder_Preview = 预览
$Font_Builder_Warning = 警告
$Font_Builder_Help = 帮助
$Font_Builder_Warning1 = 请勿手动添加或合并您自己的图标字体。系统会自动将 SymbolsNerdFont 合并到所有已加载的字体中。
$Font_Builder_Warning2 = 为确保稳定性和性能，请避免添加过多字体或使用体积过大的字体文件。大字体占用高内存，可能导致卡顿。
$Font_Builder_Help1 = 什么是字体构建器?
$Font_Builder_Help2 = 您可以为不同的 Unicode 字符范围（如拉丁语、中日韩文字）分配特定的字体文件。
$Font_Builder_Help3 = 字形查询依赖于字体的优先级。如果第一个字体中不包含某个字符，系统将按照您定义的顺序在后续字体中查找。
$Font_Builder_Preview_Debouncing = 正在处理...
$Font_Builder_Preview_BuilderFont = 正在预览构建结果
$Font_Builder_Preview_NotSelectedFont = 未选字体 (预览默认)
$Font_Builder_Preview_NotSupportedFont = 字体格式不受支持
$Languages = 语言
$States = 状态
$Features = 功能
$IME = IME
$FOCUS = 焦点
$Ime_Enabled = IME 已启用
$Ime_Enabled_Tooltip = IME 默认仅在存在输入框时启用
$Ime_Focus = IME 焦点
$Ime_Focus_Tooltip = IME 仅在存在输入框以及键盘焦点时启用
$Force_Focus_Ime = 强制 IME 焦点
$Keep_Ime_Open = 保持 IME 开启
$Keep_Ime_Open_Tooltip = 主要用于在一些不支持 IME 的输入框中临时启用 IME
$Themes = 主题
$Focus_Manage = 焦点管理配置
$Focus_Manage_Permanent = 永久
$Focus_Manage_Permanent_Tooltip = 更稳定, 焦点完全交给本 Mod 管理
$Focus_Manage_Temporary = 临时
$Focus_Manage_Temporary_Tooltip = 更好的兼容性, 仅在 IME 启用时管理焦点
$Enable_Unicode_Paste = 启用 Unicode 粘贴
$Enable_Unicode_Paste_Tooltip = 启用或关闭 Mod 提供的 unicode 粘贴功能

[Ime Window Pos]
$Policy = IME 窗口位置更新策略
$Update_By_Cursor = 基于鼠标位置
$Update_By_Cursor_Tooltip = 根据当前鼠标的位置更新 IME 窗口位置
$Update_By_Caret = 基于插入符位置
$Update_By_Caret_Tooltip = 根据当前活动的输入框的插入符位置，自动更新 IME 窗口
$Update_By_None = 无
$Update_By_None_Tooltip = 不会自动更新 IME 窗口位置
