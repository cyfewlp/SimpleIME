# Triggered by pushing a version tag (e.g. v2.0.0).
# Builds the mod, packages it, then creates a GitHub Release whose changelog
# is automatically generated from PR merges and commits since the previous tag.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create releases and upload assets

    steps:
      # -----------------------------------------------------------------------
      # Sources
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # full history needed for changelog generation

      # -----------------------------------------------------------------------
      # Toolchain: initialise the MSVC x64 developer environment so that
      # clang-cl / lld-link can locate the MSVC CRT and Windows SDK headers.
      # -----------------------------------------------------------------------
      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -----------------------------------------------------------------------
      # vcpkg — use the version pre-installed on the runner; its path is
      # already in VCPKG_INSTALLATION_ROOT.
      # -----------------------------------------------------------------------
      - name: Export VCPKG_ROOT
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_modules
          key: vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-${{ runner.os }}
          restore-keys: vcpkg-

      # -----------------------------------------------------------------------
      # FontForge — required by the CMake icon-font build step.
      # The fontforge executable must be on PATH before cmake configure.
      # -----------------------------------------------------------------------
      - name: Install FontForge
        shell: pwsh
        run: |
          choco install fontforge --yes --no-progress
          $env:PATH = "C:\Program Files (x86)\FontForgeBuilds\bin;$env:PATH"
          echo "C:\Program Files (x86)\FontForgeBuilds\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up CMake 4.x
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.x'

      # Python 3 is pre-installed on windows-latest; required by CMakeLists.

      # -----------------------------------------------------------------------
      # Build
      # -----------------------------------------------------------------------
      - name: Configure SimpleIME (Release)
        run: cmake --preset release-clangcl-ninja-vcpkg

      - name: Build SimpleIME
        run: cmake --build --preset build-release-clangcl-ninja-vcpkg --target SimpleIME

      - name: Package SimpleIME (CPack → dist/)
        run: cpack --config build/release-clangcl-ninja-vcpkg/CPackConfig.cmake

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: -c github --latest --strip header

      # -----------------------------------------------------------------------
      # GitHub Release — create release with auto-generated changelog from
      # PR merges / commits since the previous tag, then attach the artifact.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SimpleIME ${{ github.ref_name }}
          make_latest: true
          prerelease: false
          body: ${{ steps.cliff.outputs.changelog }}
          files: dist/*.7z
