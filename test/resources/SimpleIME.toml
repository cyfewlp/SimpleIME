[core]
shortcut_key = 0x9999
enable_mod = false
enable_tsf = false

[core.logging]
level = "off"
flush_level = "off"

[resources]
translation_dir = "path/to/translation"
fonts = [
    "path/to/font1.ttf",
    "path/to/font2.ttf",
]

[appearance]
language = "a language"

theme_source_color = 0x33333333
theme_dark_mode = false
theme_contrast_level = 0.233
error_display_duration = 9999
zoom = 1.75
show_settings = true

[input]
pos_update_policy = "xxx"

enable_unicode_paste = false
keep_ime_open = true
